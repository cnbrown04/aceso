services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://aceso:aceso@db:5432/aceso?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aceso
      POSTGRES_PASSWORD: aceso
      POSTGRES_DB: aceso
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aceso"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
