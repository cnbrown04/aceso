name: Feature request
description: Propose a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are most useful when they describe a real problem you hit,
        not just a capability that would be nice to have. Describe the use case first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where the current behaviour falls short.
      placeholder: "When I want to do X, I can't because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: platform
    attributes:
      label: Which part of Aceso would this affect?
      multiple: true
      options:
        - iOS app
        - Web dashboard
        - Go server
        - Addon system
        - CI / tooling
        - Docs
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to implement this?
      options:
        - label: Yes, I'd like to open a PR for this.
